<!DOCTYPE html>
<html lang="en">
    <head>
        <title>classic popcat click</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }
            .header {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #bdaa90;
            }
            .title {
                width: 80%;
                margin-top: 2em;
                max-width: 600px;
            }
            .cat-img {
                width: 100%;
                max-width: 800px;
                flex: 1 1 auto;
                text-align: center;
                color: #ffffff;
                font-size: 80px;
                -webkit-text-stroke: 3px #000000;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #p.cat-img {
                background-image: url("imgs/p.png");
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }
            /* background image for #op added but not displayed */
            #op {
                background-image: url("imgs/op.png");
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <img class="title" src="imgs/popcat.svg" alt="POPCAT!!!!!">
            <div class="cat-img" id="p">0</div>
        </div>
    </body>
</html>
